name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud API 15
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/goatcorp/dalamud-distrib/main/api15/latest.zip" -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath dalamud -Force
          "DALAMUD_HOME=$PWD\dalamud" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build
        run: dotnet build RotationCoach.csproj -c Release

      - name: Run logic tests
        run: dotnet run --project tests/LogicTests/LogicTests.csproj -c Release
